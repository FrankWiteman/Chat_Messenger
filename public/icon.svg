
<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="logo_grad_icon" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#38BDF8" />
            <stop offset="100%" stop-color="#00A8E8" />
        </linearGradient>
        <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
            <feOffset dx="0" dy="2" result="offsetblur"/>
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.3"/>
            </feComponentTransfer>
            <feMerge> 
                <feMergeNode/>
                <feMergeNode in="SourceGraphic"/> 
            </feMerge>
        </filter>
    </defs>
    
    <!-- Main Chat Bubble Shape with White Stroke -->
    <path 
        d="M20,25 H100 A12,12 0 0 1 112,37 V83 A12,12 0 0 1 100,95 H35 L15,110 V95 H20 A12,12 0 0 1 8,83 V37 A12,12 0 0 1 20,25 Z" 
        fill="url(#logo_grad_icon)" 
        stroke="#ffffff" 
        stroke-width="2.5"
        filter="url(#dropShadow)"
    />
    
    <!-- Seven Dots -->
    <g transform="translate(60, 60) skewX(-15)">
            <rect x="-28" y="-22" width="16" height="12" rx="3" fill="white" />
            <rect x="-28" y="-6" width="16" height="12" rx="3" fill="white" />
            <rect x="-8" y="-22" width="16" height="12" rx="3" fill="white" />
            <rect x="-8" y="-6" width="16" height="12" rx="3" fill="white" />
            <rect x="-8" y="10" width="16" height="12" rx="3" fill="white" />
            <rect x="12" y="-6" width="16" height="12" rx="3" fill="white" />
            <rect x="12" y="10" width="16" height="12" rx="3" fill="white" />
    </g>
</svg>
